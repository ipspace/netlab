ospf:
  ospfv3:
    06-lb-prefix:
      caveat: FRR advertises IPv6 loopback prefixes with /64 prefix length (see RFC 5340, section 4.4.3.9)
    20-default:
      caveat: OSPFv3 default route does not work in FRR used in Cumulus Linux 4.x

bgp#policy:
  60-aggregate:
    caveat: FRR version running on CL 4.x does not support suppress-map BGP aggregation option
