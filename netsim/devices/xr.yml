---
description: Cisco IOS XR Meta (Parent) Device
_meta_device: True
template: true
mgmt_if: MgmtEth0/RP0/CPU0/0
interface_name: GigabitEthernet0/0/0/{ifindex}
loopback_interface_name: Loopback{ifindex}
ifindex_offset: 0
group_vars:
  ansible_become_method: enable
  ansible_network_os: iosxr
  ansible_connection: network_cli
clab:
  group_vars:
    netlab_ready: [ ssh ]
  node:
    env:
      CLAB_MGMT_VRF: management
features:
  initial:
    ipv4:
      unnumbered: True
    ipv6:
      lla: True
    min_mtu: 68
    min_phy_mtu: 1500
    max_mtu: 9216
  bgp:
    activate_af: True
    aggregate: true
    allowas_in: true
    as_override: true
    confederation: true
    default_originate: true
    gtsm: true
    import: [ ospf, isis, connected, static, vrf ]
    local_as: true
    local_as_ibgp: true
    multihop.vrf: true
    passive: true
    password: true
    remove_private_as: true
    rs_client: true
    timers: true
    vrf_local_as: true
  gateway:
    protocol: [ vrrp ]
  isis:
    circuit_type: True
    unnumbered:
      ipv4: True
      ipv6: True
      network: True
    import: [ ospf, bgp, connected, static, vrf ]
  mpls:
    ldp: true
    vpn: true
    6pe: true
  ospf:
    unnumbered: True
    password: True
    priority: True
    timers: True
    default: True
    import: [ bgp, isis, connected, static, vrf ]
  routing:
    aspath: True
    policy:
      set:
        community:
          standard: True
          large: True
          append: True
        locpref: True
        med: True
        prepend: True
        weight: True
      delete:
        community:
          standard: True
          large: True
      match:
        prefix: True
        aspath: True
    prefix: True
    static:
      vrf: True
      inter_vrf: True
      discard: True
  sr:
    af: [ ipv4, ipv6 ]
    protocol: [ isis, ospfv2 ]
  evpn:
    transport: [ mpls, sr ]
    asymmetrical_irb: False
  vrf:
    bgp: True
    isis: True
    ospfv2: True
    ospfv3: True
external:
  image: none
