---
description: Juniper cRPD container
support:
  level: best-effort
  caveats:
  - cRPD gets most control-plane Junos features, but we don't test them on cRPD
parent: junos
group_vars:
  ansible_user: root
  ansible_ssh_pass: "clab123"
  netlab_device_type: crpd
  netlab_check_retries: 20

mgmt_if: eth0
interface_name: eth{ifindex+1}
loopback_interface_name: "lo0"
mtu: 1500

features:
  initial:
    ipv4:
      unnumbered: false               # The 'unnumbered-address' family inet command does not work on cRPD
  vlan: false
  vxlan: false
  evpn:
    irb: true
  gateway:
    protocol: [ vrrp ]

clab:
  image: crpd:24.4R1.9
  build: https://containerlab.dev/manual/kinds/crpd/
  node:
    kind: juniper_crpd
    config_templates:
      hosts: /etc/hosts:shared
      netlab-config: /config/netlab/config.sh
    exec:
    - chmod +x /config/netlab/config.sh
  interface:
    name: eth{ifindex+1}
  features:
    initial:
      config_mode: [ sh ]
  group_vars:
    netlab_config_mode: sh
    netlab_show_command: [ cli, -c, 'show $@' ]
    netlab_check_command: who
    netlab_ready: [ ssh ]
    netlab_config_wrapper: |
      {% if netlab_config_mode == 'sh' and netlab_config_text and not "# Created by netlab" in netlab_config_text %}
      #!/bin/bash
      cat > {{ netlab_config_path}}/output.conf <<EOF
      {{ netlab_config_text }}
      EOF
      {{ netlab_config_path}}/config.sh {{ netlab_config_path}}/output.conf
      {% else %}
      {{ netlab_config_text }}
      {% endif %}
#    ansible_connection: docker
#    netlab_console_connection: docker
    netlab_config_path: /config/netlab/

graphite.icon: router
