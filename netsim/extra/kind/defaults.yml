# bgp.session default settings -- mostly attributes
#
---
daemons:
  kind:
    parent: linux
    attributes:
      node:
        kind:
          workers: int
    initial:
      ipv4:
        unnumbered: false
      ipv6:
        lla: true
        use_ra: true
    clab:
      roles: [ host ]
      node:
        kind: k8s-kind
      features:
        lag: false
        vlan: false
      daemon_config:
        initial: /tmp/kind
        routing: /tmp/routing
      image: kindest/node:v1.34.3
      build: 'https://netlab.tools/netlab/clab/#netlab-clab-build'

  kind-node:
    parent: linux
    clab:
      kind: ext-container
      features:
        lag: false
        vlan: false
      roles: [ host ]
      image: kindest/node:v1.34.3
      node_config:
        initial: /etc/config/01-initial.sh:cp_sh
        routing: /etc/config/02-routing.sh:cp_sh
