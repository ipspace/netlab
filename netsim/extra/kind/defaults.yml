# Defined KinD daemons (cluster and node)
#
---
daemons:
  kind-node:
    parent: linux
    description: Node in a KinD cluster
    clab:
      kind: ext-container
      features:
        initial:
          roles: [ host, router ]
        lag: false
        vlan: false
      node_config:
        initial: /etc/01-initial.sh:cp_sh
        routing: /etc/02-routing.sh:cp_sh
      group_vars:
        netlab_ip_forwarding: True
        netlab_config_mode: cp_sh
