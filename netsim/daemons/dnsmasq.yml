---
description: DNSmasq - DNS and DHCP server
packages:
  dnsmasq: dnsmasq
daemon_config:
  dnsmasq: /etc/dnsmasq.conf                # dnsmasq configuration (including DHCP config)
  dhcp: /etc/dhcp.ignore                    # Empty file to keep everyone happy
  initial: /etc/config/01-initial.ns-sh     # Initial device config executed on host in container namespace
  routing: /etc/config/02-routing.ns-sh     # ... static routes configured on host in container namespace
node:
  module: [ dhcp ]
clab:
  group_vars:
    docker_shell: bash -il
  image: netlab/dnsmasq:latest
  build: 'https://netlab.tools/netlab/clab/#netlab-clab-build'
  features:
    initial:
      roles: [ host ]

libvirt:                        # Not yet available on libvirt or virtualbox
  image:
virtualbox:
  image:
features:
  dhcp:
    server: true
  initial:
    roles: [ host ]
dhcp:
  server: true
module: [ dhcp ]
