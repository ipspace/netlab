---
description: Kubernetes in Docker (KinD) cluster
parent: linux
role: router
plugin: [ kind ]
attributes:
  node:
    kind:
      workers: int
initial:
  ipv4:
    unnumbered: false
  ipv6:
    lla: true
    use_ra: true
clab:
  roles: [ host ]
  node:
    kind: k8s-kind
  features:
    lag: false
    vlan: false
    initial:
      roles: [ host, router ]
  daemon_config:
    initial: /tmp/kind
    routing: /tmp/routing
  image: kindest/node:v1.34.3
