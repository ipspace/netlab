- name: "Netscaler: deploying {{ netsim_action }} from {{ config_template }}"
  delegate_to: localhost
  ansible.builtin.shell: |
    echo '{{ lookup("template", config_template) }}' | while IFS= read -r line; do
      [ -n "$line" ] && docker exec {{ hostname }} nscli -U '127.0.0.1:{{ ansible_user }}:{{ ansible_ssh_pass }}' "$line" || true
    done
  when: not ansible_check_mode
  tags: [ print_action, always ]
