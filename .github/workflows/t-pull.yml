name: Check integration tests with "none" device

on:
  pull_request:
    paths:
    - '**.py'
    - '**.yml'

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [ "3.8", "3.12", "3.13", "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Inspect GH event context
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
      run: |
        echo "========== GITHUB CONTEXT ============"
        echo "$GITHUB_CONTEXT"
    - name: Run Mypy
      if: ${{ github.event.pull_request.head.repo.full_name != 'ipspace/netlab' }}
      run: |
        set -e
        mypy -p netsim
        for file in netsim/extra/*/plugin.py; do
          python3 -m mypy $file
        done
    - name: Consolidate system files for faster pytest
      if: ${{ github.event.pull_request.head.repo.full_name != 'ipspace/netlab' }}
      run: |
        # Pre-consolidate all system/package YAML files
        # This cache will be used by all _read.load() calls in pytest tests
        netlab consolidate -o /tmp/netlab-system-cache.json
        echo "✅ System cache created: $(ls -lh /tmp/netlab-system-cache.json | awk '{print $5}')"
        cache_info=$(python3 -c "import json; data=json.load(open('/tmp/netlab-system-cache.json')); print(f\"{len(data['files'])} files, netlab {data.get('netlab_version', 'unknown')}\")")
        echo "📦 Cache contains: $cache_info"
    - name: Run transformation tests (with JSON cache)
      if: ${{ github.event.pull_request.head.repo.full_name != 'ipspace/netlab' }}
      env:
        NETLAB_JSON_CACHE: /tmp/netlab-system-cache.json
      run: |
        cd tests
        PYTHONPATH="../" pytest
    - name: Check integration tests
      run: |
        cd tests
        ./check-integration-tests.sh
