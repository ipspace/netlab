---
# Test topology to verify BGP VRF router_id handling inconsistencies
# This topology tests scenarios where:
# 1. Only global bgp.router_id is set
# 2. Only VRF-specific router_id is set
# 3. Both are set (VRF-specific should take precedence)

name: bgp-vrf-test

module: [ bgp, vrf ]

defaults:
  device: eos
  provider: external

nodes:
  r1:
    device: eos
    bgp:
      as: 65000
      router_id: 1.1.1.1  # Global router_id
  r2:
    device: eos
    bgp:
      as: 65000
      router_id: 2.2.2.2
  r3:
    device: nxos
    bgp:
      as: 65000
      router_id: 3.3.3.3
  r4:
    device: routeros7
    bgp:
      as: 65000
      router_id: 4.4.4.4
  r5:
    device: vjunos-router
    bgp:
      as: 65000
      router_id: 5.5.5.5

vrfs:
  vrf1:
    bgp:
      router_id: 10.10.10.10  # VRF-specific router_id
    links: [ r1-r2, r2-r3 ]
  vrf2:
    # No VRF-specific router_id - should fall back to global
    links: [ r3-r4 ]
  vrf3:
    bgp:
      router_id: 30.30.30.30  # VRF-specific router_id
    links: [ r4-r5 ]

links:
- r1-r2
- r2-r3
- r3-r4
- r4-r5
