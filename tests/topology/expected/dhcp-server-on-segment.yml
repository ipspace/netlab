dhcp:
  pools:
  - clean_name: links_1_
    excluded:
      ipv4:
      - 172.16.0.2
    ipv4: 172.16.0.0/24
    name: links[1]
input:
- topology/input/dhcp-server-on-segment.yml
- package:topology-defaults.yml
libvirt:
  providers:
    clab: true
links:
- _linkname: links[1]
  bridge: input_1
  dhcp:
    client:
      ipv4: true
    subnet:
      ipv4: true
  interfaces:
  - dhcp:
      client:
        ipv4: true
    ifindex: 1
    ifname: eth1
    ipv4: 172.16.0.1/24
    node: h1
  - dhcp:
      client:
        ipv4: true
    ifindex: 1
    ifname: eth1
    ipv4: 172.16.0.2/24
    node: dhs
  libvirt:
    provider:
      clab: true
  linkindex: 1
  node_count: 2
  prefix:
    ipv4: 172.16.0.0/24
  role: stub
  type: lan
module:
- dhcp
- routing
name: input
nodes:
  dhs:
    _daemon: true
    _daemon_config:
      dhcp: /etc/dhcp.ignore
      dnsmasq: /etc/dnsmasq.conf
    _daemon_parent: linux
    _node_config:
      initial: :ns
      routing: :ns
    af:
      ipv4: true
    box: netlab/dnsmasq:latest
    clab:
      binds:
      - source: node_files/dhs/dnsmasq
        target: /etc/dnsmasq.conf
      - source: node_files/dhs/dhcp
        target: /etc/dhcp.ignore
      - mode: ro
        source: node_files/-shared-hosts
        target: /etc/hosts
      config_templates:
      - mode: ns
        source: initial
        target: ''
      - mode: ns
        source: routing
        target: ''
      - source: dnsmasq
        target: /etc/dnsmasq.conf
      - source: dhcp
        target: /etc/dhcp.ignore
      - mode: shared
        source: hosts
        target: /etc/hosts
      kind: linux
    device: dnsmasq
    dhcp:
      pools:
      - clean_name: links_1_
        excluded:
          ipv4:
          - 172.16.0.2
        ipv4: 172.16.0.0/24
        name: links[1]
      server: true
    hostname: clab-input-dhs
    id: 2
    interfaces:
    - bridge: input_1
      ifindex: 1
      ifname: eth1
      ipv4: 172.16.0.2/24
      linkindex: 1
      mtu: 1500
      name: dhs -> h1
      neighbors:
      - dhcp:
          client:
            ipv4: true
        ifname: eth1
        ipv4: 172.16.0.1/24
        node: h1
      role: stub
      type: lan
    mgmt:
      ifname: eth0
      ipv4: 192.168.121.102
      mac: ca:fe:00:02:00:00
    module:
    - dhcp
    - routing
    mtu: 1500
    name: dhs
    netlab_ansible_skip_module:
    - dnsmasq
    - dhcp
    - initial
    - routing
    provider: clab
    role: host
    routing:
      static: []
  h1:
    af:
      ipv4: true
    box: bento/ubuntu-24.04
    device: linux
    id: 1
    interfaces:
    - bridge: input_1
      dhcp:
        client:
          ipv4: true
      ifindex: 1
      ifname: eth1
      linkindex: 1
      name: h1 -> dhs
      neighbors:
      - dhcp:
          client:
            ipv4: true
        ifname: eth1
        ipv4: 172.16.0.2/24
        node: dhs
      role: stub
      type: lan
    mgmt:
      ifname: eth0
      ipv4: 192.168.121.101
      mac: ca:fe:00:01:00:00
    module:
    - dhcp
    name: h1
    role: host
provider: libvirt
