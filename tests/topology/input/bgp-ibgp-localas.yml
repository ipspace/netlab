  x1:
    bgp.as: 65100
    loopback.ipv4: 172.42.1.1/24
  x2:
    bgp.as: 65101
    loopback.ipv4: 172.42.2.1/24
  x3:
    bgp.originate: 172.42.3.0/24
  x4:
    bgp.as: 65101
    loopback.ipv4: 172.42.4.1/24

links:
- dut:
    vlan.access: red
  x1:
- dut:
    bgp.local_as: 65101
  x2:
- dut-x3
- x2-x4
