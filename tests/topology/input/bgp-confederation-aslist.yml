---
#
# Test that bgp.confederation data is correctly propagated to nodes
# when bgp.as_list is used (regression test for bgp.as_list + confederation bug)
#
module: [ bgp ]
defaults.device: none

bgp.confederation:
  300:
    members: [ 301 ]

bgp:
  as_list:
    100:
      members: [ r1 ]
    301:
      members: [ r3a ]

nodes:
  r1:
  r3a:

links: [ r1-r3a ]
