---
message: |
  This lab topology creates a leaf/spine fabric with 4 spines and 16 leafs.

plugin: [ fabric, bgp.session ]

provider: clab

module: [ vlan, vxlan, ospf, bgp, evpn ]
bgp.as: 65000

vlans:
  V1:

fabric:
  spines: 4
  leafs: 16
  leaf:
    graph.rank: 2
    vlans:
      V1:
  spine:
    graph.rank: 1
    module: [ bgp, ospf, evpn ]
    bgp.rr: True
