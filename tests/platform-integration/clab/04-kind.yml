message:
  The test checks creation of KinD clusters

provider: clab
plugin: [ kind ]

nodes:
  sw:
    device: frr
  kc:
    device: kind
    kind.workers: 3
links:
- sw-kc

validate:
  ping:
    plugin: ping(nodes['kc-worker'].interfaces[0].ipv4,src=node.loopback.ipv4)
    pass: Kind worker can communicate with the adjacent switch
    wait: 3
    nodes: [ sw ]
