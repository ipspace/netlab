# Check module reordering code -- sort final node modules based on module dependencies
#
defaults.device: none
module: [sr, isis]
addressing.loopback.ipv6: 2001:db8:42::/48

nodes:
  c1:
    _features.sr.af: [ ipv4 ]
  c2:
    _features.sr: True
  e1:
    _features.sr.af: [ ipv4 ]
    sr.af.ipv4: True
  e2:
    _features.sr.af: [ ipv6 ]

links:
- e1-c1
- e1-c2
- e2-c1
- e2-c2
