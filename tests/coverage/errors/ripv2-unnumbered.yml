#
# RIPv2 cannot run over unnumbered interfaces on devices that don't support it
#

defaults:
  devices.none.features.ripv2.unnumbered: False

defaults.device: none

module: [ ripv2, vrf ]

nodes:
  r1:
  r2:
    _features.ripv2.unnumbered: True

vrfs:
  red:
    links:
    - r1:
      r2:
    - r1:
      r2:
      unnumbered: True

links:
- r1:
  r2:
- r1:
  r2:
  unnumbered: True
