groups:
  netlab_no_reload:
    members:
    - h1
    - h2
input:
- coverage/input/device-node-defaults.yml
- package:topology-defaults.yml
links:
- _linkname: links[1]
  bridge: input_1
  interfaces:
  - ifindex: 1
    ifname: eth1
    ipv4: 172.16.0.2/24
    node: h1
  - ifindex: 1
    ifname: eth1
    ipv4: 172.16.0.1/24
    node: rtr
  linkindex: 1
  node_count: 2
  prefix:
    ipv4: 172.16.0.0/24
  role: stub
  type: lan
- _linkname: links[2]
  bridge: input_2
  interfaces:
  - ifindex: 1
    ifname: eth1
    ipv4: 172.16.1.3/24
    node: h2
  - ifindex: 2
    ifname: eth2
    ipv4: 172.16.1.1/24
    node: rtr
  linkindex: 2
  node_count: 2
  prefix:
    ipv4: 172.16.1.0/24
  role: stub
  type: lan
module:
- routing
- ospf
name: input
nodes:
  h1:
    _node_config:
      initial: :ns
      routing: :ns
    af:
      ipv4: true
    box: python:3.13-alpine
    clab:
      binds:
      - mode: ro
        source: node_files/-shared-hosts
        target: /etc/hosts
      config_templates:
      - mode: ns
        source: initial
        target: ''
      - mode: ns
        source: routing
        target: ''
      - mode: shared
        source: hosts
        target: /etc/hosts
      kind: linux
    device: linux
    hostname: clab-input-h1
    id: 2
    interfaces:
    - bridge: input_1
      gateway:
        ipv4: 172.16.0.1/24
      ifindex: 1
      ifname: eth1
      ipv4: 172.16.0.2/24
      linkindex: 1
      mtu: 1500
      name: h1 -> rtr
      neighbors:
      - ifname: eth1
        ipv4: 172.16.0.1/24
        node: rtr
      role: stub
      type: lan
    mgmt:
      ifname: eth0
      ipv4: 192.168.121.102
      mac: ca:fe:00:02:00:00
    module:
    - routing
    mtu: 1500
    name: h1
    netlab_ansible_skip_module:
    - initial
    - routing
    role: host
    routing:
      static:
      - ipv4: 172.16.0.0/16
        nexthop:
          idx: 0
          intf: eth1
          ipv4: 172.16.0.1
      - ipv4: 10.0.0.0/24
        nexthop:
          idx: 0
          intf: eth1
          ipv4: 172.16.0.1
      - ipv4: 10.1.0.0/16
        nexthop:
          idx: 0
          intf: eth1
          ipv4: 172.16.0.1
      - ipv4: 10.2.0.0/24
        nexthop:
          idx: 0
          intf: eth1
          ipv4: 172.16.0.1
  h2:
    _node_config:
      initial: :ns
      routing: :ns
    af:
      ipv4: true
    box: python:3.13-alpine
    clab:
      binds:
      - mode: ro
        source: node_files/-shared-hosts
        target: /etc/hosts
      config_templates:
      - mode: ns
        source: initial
        target: ''
      - mode: ns
        source: routing
        target: ''
      - mode: shared
        source: hosts
        target: /etc/hosts
      kind: linux
    device: linux
    hostname: clab-input-h2
    id: 3
    interfaces:
    - bridge: input_2
      gateway:
        ipv4: 172.16.1.1/24
      ifindex: 1
      ifname: eth1
      ipv4: 172.16.1.3/24
      linkindex: 2
      mtu: 1500
      name: h2 -> rtr
      neighbors:
      - ifname: eth2
        ipv4: 172.16.1.1/24
        node: rtr
      role: stub
      type: lan
    mgmt:
      ifname: eth0
      ipv4: 192.168.121.103
      mac: ca:fe:00:03:00:00
    module:
    - routing
    mtu: 1500
    name: h2
    netlab_ansible_skip_module:
    - initial
    - routing
    role: host
    routing:
      static:
      - ipv4: 172.16.0.0/16
        nexthop:
          idx: 0
          intf: eth1
          ipv4: 172.16.1.1
      - ipv4: 10.0.0.0/24
        nexthop:
          idx: 0
          intf: eth1
          ipv4: 172.16.1.1
      - ipv4: 10.1.0.0/16
        nexthop:
          idx: 0
          intf: eth1
          ipv4: 172.16.1.1
      - ipv4: 10.2.0.0/24
        nexthop:
          idx: 0
          intf: eth1
          ipv4: 172.16.1.1
  rtr:
    _node_config:
      initial: /etc/config/01-initial.sh:sh
      ospf: /etc/config/02-ospf.sh:sh
    af:
      ipv4: true
    box: quay.io/frrouting/frr:10.0.1
    clab:
      binds:
      - source: node_files/rtr/initial
        target: /etc/config/01-initial.sh
      - source: node_files/rtr/ospf
        target: /etc/config/02-ospf.sh
      - source: node_files/rtr/daemons
        target: /etc/frr/daemons
      - mode: ro
        source: node_files/-shared-hosts
        target: /etc/hosts
      config_templates:
      - mode: sh
        source: initial
        target: /etc/config/01-initial.sh
      - mode: sh
        source: ospf
        target: /etc/config/02-ospf.sh
      - source: daemons
        target: /etc/frr/daemons
      - mode: shared
        source: hosts
        target: /etc/hosts
      exec:
      - sleep 1
      image: none
      kind: linux
    device: frr
    hostname: clab-input-rtr
    id: 1
    interfaces:
    - bridge: input_1
      ifindex: 1
      ifname: eth1
      ipv4: 172.16.0.1/24
      linkindex: 1
      mtu: 1500
      name: rtr -> h1
      neighbors:
      - ifname: eth1
        ipv4: 172.16.0.2/24
        node: h1
      ospf:
        area: 0.0.0.0
        network_type: point-to-point
        passive: true
      role: stub
      type: lan
    - bridge: input_2
      ifindex: 2
      ifname: eth2
      ipv4: 172.16.1.1/24
      linkindex: 2
      mtu: 1500
      name: rtr -> h2
      neighbors:
      - ifname: eth1
        ipv4: 172.16.1.3/24
        node: h2
      ospf:
        area: 0.0.0.0
        network_type: point-to-point
        passive: true
      role: stub
      type: lan
    loopback:
      ifindex: 0
      ifname: lo
      ipv4: 10.0.0.1/32
      neighbors: []
      ospf:
        area: 0.0.0.0
        passive: false
      type: loopback
      virtual_interface: true
    mgmt:
      ifname: eth0
      ipv4: 192.168.121.101
      mac: ca:fe:00:01:00:00
    module:
    - ospf
    mtu: 1500
    name: rtr
    netlab_ansible_skip_module:
    - initial
    - ospf
    ospf:
      af:
        ipv4: true
      area: 0.0.0.0
      areas:
      - _area_int: 0
        area: 0.0.0.0
        kind: regular
      router_id: 10.0.0.1
    role: router
ospf:
  area: 0.0.0.0
provider: clab
