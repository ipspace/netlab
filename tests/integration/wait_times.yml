# Define standard wait times for validation tests
---
const.validate:
  ping: 5
  ping_vrf: 5             # Some devices are slow to populate the VRF tables
  ping_long: 15
  vxlan_ping: 20
  ping_stp: 45
  ping_irb: 10
  ping_evpn: 15           # Ping across EVPN L3VRF (needed for Cisco IOS/XE)
  ra_send: 30

  ospfv2_adj_p2p: 30
  ospfv2_adj_lan: 50
  ospfv2_adj_stp: 120     # OSPFv2 LAN adjacency over STP-controlled ports
  ospfv2_spf: 10
  ospfv2_spf_long: 30     # OSPFv2 SPF dependent on other protocols (example: BGP default route)

  ospfv3_adj_p2p: 30
  ospfv3_adj_lan: 50
  ospfv3_adj_stp: 120     # OSPFv3 LAN adjacency over STP-controlled ports
  ospfv3_spf: 10
  ospfv3_spf_long: 30     # OSPFv3 SPF dependent on other protocols (example: BGP default route)

  ospf_import: 20

  ebgp_session: 30
  ibgp_session: 30
  bgp_af_activate: 5
  bgp_scan_time: 5
  bgp_scan_long: 15       # Needed for things that might require multiple scans like aggregate prefixes
  bgp_v4_originate: 15    # Time needed for BGP to wake up and start originating IPv4 prefixes
  bgp_v6_originate: 15    # Time needed for BGP to wake up and start originating IPv6 prefixes
  bgp_v4_redist: 15       # The time it takes for BGP to redistribute IPv4 routes
  bgp_v6_redist: 15       # The time it takes for BGP to redistribute IPv6 routes

  isis_adj_p2p: 20
  isis_adj_lan: 50
  isis_spf: 15
  isis_spf_long: 45
  isis_redist: 30

  rip_start: 60
  rip_update: 20

  ldp_adj: 30

  stp_forwarding: 40
  lacp_setup: 10

  bfd_init: 6

# Device-specific wait times
  xr.bgp_v4_originate: 80                         # BGP on IOS XR takes "forever" to wake up
  xr.bgp_v6_originate: 80                         # ... and make BGP routes valid
  xr.bgp_v4_redist: 90                            # Redistribution is no better :(
  xr.isis_redist: 60
  xr.ebgp_session: 90                             # And it takes an awfully long time to start EBGP sessions
  xr.ping_vrf: 20                                 # ... or populate a VRF routing table
  xr.bgp_scan_long: 30                            # ... or even propagate initial BGP updates :(
  xr.isis_spf: 30                                 # VRF IS-IS takes a while to start due to redistribution wait timer

  ios.bgp_v6_redist: 60                           # IOS XE takes "forever" to redistribute static routes
  ios.ping_evpn: 70                               # IOS XE takes a minute to redistribute connected subnets in EVPN
  iol.bgp_scan_long: 30                           # Might need longer when configured with startup config

  cisco8000v.ping_irb: 90                         # Cisco 8000v takes a long time to activate the IRB interface
  cisco8000v.ping_long: 15                        # ... and even to populate the routing tables
  vjunos-switch.ping_irb: 40                      # ... and so does vjunos-switch
  vjunos-router.ping_irb: 90                      # ... and vjunos-router

  nxos.bgp_v4_redist: 40                          # Another sloth on IPv4...
  nxos.bgp_v6_redist: 40                          # ... and IPv6

  vptx.ldp_adj: 180                               # Have no idea why vPTX takes so long for LDP to work
  vptx.ibgp_session: 40

  arubacx.bfd_init: 10                            # ArubaCX seems to need longer to start BFD
