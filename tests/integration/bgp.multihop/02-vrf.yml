---
message: |
  Use this topology to test the VRF EBGP multihop implementation

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]

groups:
  probes:
    device: frr
    provider: clab
    members: [ pe2, c1, ce1 ]

defaults.paths.prepend.plugin: [ "topology:../plugin" ]
plugin: [ ebgp.multihop, bgp.session, adjust_test ]

vrfs:
  tenant:
    links:
    - dut-c1
    - c1-pe2
    - dut-ce1

bgp.multihop.sessions:
- dut:
    vrf: tenant
  pe2:
    passive: True

nodes:
  dut:
    bgp.as: 65000
    module: [ bgp, ospf, vrf ]
    vrf.loopback: True
  c1:
    module: [ ospf ]
  pe2:
    bgp.as: 65101
    module: [ bgp, ospf ]
  ce1:
    bgp.as: 65200
    module: [ bgp ]

_adjust:
- nodes: [ dut ]              # Remove 'suppress map' test if the device does not support prefix lists
  features:
  - key: vrf.ospfv3
    value: True
  warning: OSPFv3 VRF instances are not implemented on device {device}
  remove_af: [ ipv6 ]
  remove:
  - validate.ospf6
  - validate.bgp6
  - validate.prefix6

validate:
  ospf:
    description: Check OSPFv2 adjacency with DUT
    wait_msg: Waiting for OSPF adjacency process to complete
    wait: ospfv2_adj_p2p
    nodes: [ c1 ]
    plugin: ospf_neighbor(nodes.dut.vrfs.tenant.ospf.router_id)
  ospf6:
    description: Check OSPFv3 adjacency with DUT
    wait_msg: Waiting for OSPF adjacency process to complete
    wait: ospfv3_adj_p2p
    nodes: [ c1 ]
    plugin: ospf6_neighbor(nodes.dut.vrfs.tenant.ospf.router_id)
  bgp:
    description: Check IPv4 EBGP sessions with DUT
    wait_msg: Wait for BGP sessions to be established
    wait: ebgp_session
    nodes: [ pe2, ce1 ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')
  bgp6:
    description: Check IPv6 EBGP sessions with DUT
    wait_msg: Wait for BGP sessions to be established
    wait: ebgp_session
    nodes: [ pe2 ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut',af='ipv6')
  prefix:
    description: Check whether DUT propagates the IPv4 beacon prefix
    wait_msg: Wait for BGP convergence
    wait: bgp_scan_long
    nodes: [ pe2 ]
    plugin: bgp_prefix(nodes.ce1.loopback.ipv4)
  prefix6:
    description: Check whether DUT propagates the IPv6 beacon prefix
    wait_msg: Wait for BGP convergence
    wait: bgp_scan_long
    nodes: [ pe2 ]
    plugin: bgp_prefix(nodes.ce1.loopback.ipv6,af='ipv6')
