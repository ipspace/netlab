---
message: |
  This lab tests the device configuratio through startup config. The topology
  tries to configure OSPF on the device and checks OSPF adjacencies.

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]
module: [ ospf ]

groups:
  probes:
    device: frr
    provider: clab
    members: [ x1, x2, x3 ]

nodes:
  dut:
    ospf.area: 2
    role: router
    netlab_config_mode: startup
    id: 1
  x1:
    ospf.area: 0
  x2:
    ospf.area: 2
  x3:
    ospf.area: 3

links:
- dut:
  x1:
  ospf.area: 0
  mtu: 1500

- dut:
  x2:
  ospf.area: 2
  mtu: 1500

- dut:
  x3:
  ospf.area: 3
  mtu: 1500

validate:
  adj:
    description: Check OSPF adjacencies
    wait: ospfv2_adj_p2p
    wait_msg: Waiting for OSPF adjacency process to complete
    nodes: [ x1, x2, x3 ]
    plugin: ospf_neighbor(nodes.dut.ospf.router_id)
