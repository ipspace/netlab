---
message: |
  Use this topology to test basic EIGRP IPv4 implementation and route
  propagation. Two routers (r1, r2) run EIGRP AS 2 and should establish
  adjacency and exchange routes, enabling end-to-end connectivity between
  two Linux hosts connected to the routers.

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]

groups:
  _auto_create: True
  hosts:
    members: [ h1, h2 ]
    device: linux
    provider: clab
  routers:
    members: [ r1, r2 ]
    module: [ eigrp ]
    eigrp.as: 2
  probes:
    members: [ r2 ]
    device: iol
    provider: clab

links: [ h1-r1, r1-r2, r2-h2 ]

validate:
  ping_h1_h2:
    description: Ping-based reachability test across an EIGRP network
    wait_msg: Waiting for EIGRP to wake up
    wait: 30
    nodes: [ h1 ]
    plugin: ping('h2')
