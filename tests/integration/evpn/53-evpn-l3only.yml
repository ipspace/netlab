---
message: |
  The device under test is a VLAN-to-VXLAN layer-3 switch between an access
  interface and an EVPN transit VNI.

  Hosts should be able to ping each other.

  Please note it might take a while for the lab to work due to STP learning
  phase.

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]
plugin: [ fix_mtu ]

groups:
  _auto_create: True
  hosts:
    members: [ hr1, hr2, hb1, hb2 ]
    device: linux
    provider: clab
  pe:
    members: [ dut, s2 ]
    module: [ vrf, mpls, ospf, bgp, evpn ]
  x_p:
    members: [ p ]
    module: [ mpls, ospf ]
    device: frr
    provider: clab
  x_pe:
    members: [ s2 ]
    device: eos
    provider: clab

bgp.as: 65000
mpls.ldp: True
evpn.transport: mpls
evpn.vrfs: [ customer, other ]

vrfs:
  customer:
    links: [ hr1-dut, hr2-s2 ]
  other:
    links: [ hb1-dut, hb2-s2 ]

links:
- interfaces: [ dut, p ]
  mtu: 1600
- interfaces: [ s2, p ]
  mtu: 1600

validate:
  ospf_adj:
    description: Check OSPF adjacencies with DUT
    wait: ospfv2_adj_p2p
    nodes: [ p ]
    wait_msg: Waiting for OSPF adjacency process to complete
    plugin: ospf_neighbor(nodes.dut.ospf.router_id)
    stop_on_error: True

  ibgp_adj:
    description: Check IBGP adjacencies with DUT
    wait: ibgp_session
    nodes: [ s2 ]
    wait_msg: Waiting for IBGP session
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')
    stop_on_error: True

  ping_gw:
    description: Pinging default gateway
    wait_msg: Waiting for STP and IRB to wake up
    wait: ping_irb
    nodes: [ hr1, hb1 ]
    plugin: ping(node.interfaces[0].gateway.ipv4)

  ping_cust:
    description: End-to-end reachability in Customer VRF
    wait: ping_evpn
    wait_msg: Waiting for EVPN route redistribution to work
    nodes: [ hr1 ]
    plugin: ping('hr2')

  ping_other:
    description: End-to-end reachability in other VRF
    wait: ping_evpn
    nodes: [ hb1 ]
    plugin: ping('hb2')
