---
message: |
  The device under test is a VLAN-to-VXLAN layer-3 switch between two access
  VLANs and two VXLAN VNIs. Both EVPN PE-devices perform inter-VLAN routing
  using transit VNI (symmetrical IRB) when needed.

  All hosts should be able to ping each other.

  Please note it might take a while for the lab to work due to STP learning
  phase.

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]

plugin: [ anycast-check, fix_mtu ]

groups:
  _auto_create: True
  hosts:
    members: [ h1, h2, h3, h4 ]
    device: linux
    provider: clab
  switches:
    members: [ dut, s2 ]
    module: [ vlan, vxlan, vrf, ospf, bgp, evpn, gateway ]
  x_switches:
    members: [ s2 ]
    device: frr
    provider: clab

bgp.as: 65000
gateway.protocol: anycast

vrfs:
  customer:
    evpn.transit_vni: 5042

vlans:
  red:
    role: external
    links: [ dut-h1, s2-h2 ]
    vrf: customer
    gateway: True
  blue:
    role: external
    links: [ dut-h3 ]
    vrf: customer
    gateway: True
  green:
    role: external
    links: [ s2-h4 ]
    vrf: customer
    gateway: True

links:
- dut:
  s2:
  mtu: 1600

validate:
  anycast:
    description: Placeholder to check anycast support
    wait: 1

  ospf_adj:
    description: Check OSPF adjacencies with DUT
    wait: ospfv2_adj_p2p
    nodes: [ s2 ]
    wait_msg: Waiting for OSPF adjacency process to complete
    plugin: ospf_neighbor(nodes.dut.ospf.router_id)
    stop_on_error: True

  ibgp_adj:
    description: Check IBGP adjacencies with DUT
    wait: ibgp_session
    nodes: [ s2 ]
    wait_msg: Waiting for IGBP session
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')
    stop_on_error: True

  ping_vlan:
    description: Intra-VLAN ping-based reachability test
    wait_msg: Waiting for OSFP and STP to wake up
    wait: ping_stp
    nodes: [ h1 ]
    plugin: ping('h2')

  ping_gw:
    description: Ping anycast gateway in VLAN red
    wait_msg: Waiting for the anycast gateway to wake up
    wait: ping_irb
    nodes: [ h1, h2 ]
    plugin: ping(nodes.h1.interfaces[0].gateway.ipv4)

  ping_irb_h3:
    description: IRB ping-based reachability test (VLAN Blue)
    wait_msg: Waiting for OSFP and STP to wake up
    wait: ping_long
    nodes: [ h1, h2, h4 ]
    plugin: ping('h3')

  ping_irb_h4:
    description: IRB ping-based reachability test (VLAN Green)
    wait_msg: Waiting for OSFP and STP to wake up
    wait: ping_long
    nodes: [ h1, h2, h3 ]
    plugin: ping('h4')
