---
message: |
  The device under test is a VLAN-to-VXLAN layer-3 switch between an access
  interface and an EVPN transit VNI.

  Hosts should be able to ping each other.

  Please note it might take a while for the lab to work due to STP learning
  phase.

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]
plugin: [ fix_mtu ]

groups:
  _auto_create: True
  hosts:
    members: [ h1, h2 ]
    device: linux
    provider: clab
  switches:
    members: [ dut, s2 ]
    module: [ vlan, vxlan, vrf, ospf, bgp, evpn ]
  x_switches:
    members: [ s2 ]
    device: frr
    provider: clab

bgp.as: 65000

vrfs:
  customer:
    evpn.transit_vni: 5042

links:
- dut:
  h1:
  vrf: customer
- s2:
  h2:
  vrf: customer
- dut:
  s2:
  mtu: 1600

validate:
  ospf_adj:
    description: Check OSPF adjacencies with DUT
    wait: ospfv2_adj_p2p
    nodes: [ s2 ]
    wait_msg: Waiting for OSPF adjacency process to complete
    plugin: ospf_neighbor(nodes.dut.ospf.router_id)
    stop_on_error: True

  ibgp_adj:
    description: Check IBGP adjacencies with DUT
    wait: ibgp_session
    nodes: [ s2 ]
    wait_msg: Waiting for IGBP session
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')
    stop_on_error: True

  ping_gw:
    description: Pinging default gateway
    wait_msg: Waiting for STP and IRB to wake up
    wait: ping_irb
    nodes: [ h1 ]
    plugin: ping(nodes.h1.interfaces[0].gateway.ipv4)

  ping_vlan:
    description: End-to-end Intra-VRF ping-based reachability test
    wait: ping
    nodes: [ h1 ]
    plugin: ping('h2')
