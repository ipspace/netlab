message: |
  The tested device (DUT) is a PE-router. It runs OSPFv2 and SR-MPLS and has an
  IBGP session with another PE-router. It has to perform IP-to-MPLS
  encapsulation to get the traffic across the BGP-free MPLS core.

  The validation test checks end-to-end connectivity across a BGP-free MPLS core
  between a set of linux hosts attached to the PE-routers.

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]

bgp.advertise_loopback: false
sr.protocol: [ ospfv2 ]

groups:
  _auto_create: True
  hosts:
    members: [ h1, h2 ]
    device: linux
    provider: clab
  pe:
    members: [ dut, pe2 ]
    module: [ ospf, bgp, sr ]
    bgp.as: 65001
  p:
    members: [ p1, p2 ]
    module: [ ospf, sr ]
  x_switches:
    members: [ p1, p2, pe2 ]
    device: frr
    provider: clab

links:
- h1:
  dut:
  ospf: False
- dut-p1
- p1-p2
- p2-pe2
- pe2:
  h2:
  ospf: False

validate:
  ospf:
    description: Check OSPFv2 sessions with DUT
    wait: ospfv2_adj_p2p
    wait_msg: Waiting for OSPFv2 adjacency
    nodes: [ p1 ]
    plugin: ospf_neighbor(nodes.dut.ospf.router_id)
    stop_on_error: true
  ibgp:
    description: Check IBGP session
    wait: ibgp_session
    wait_msg: Waiting for IBGP sessions to start
    nodes: [ pe2 ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')
    stop_on_error: true
  ping:
    description: Ping-based end-to-end reachability test
    wait_msg: We might have to wait a bit longer
    wait: ping_long
    nodes: [ h1 ]
    plugin: ping('h2')
